<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" style="filter: drop-shadow(0 12px 28px rgba(0,0,0,0.65));">
    <defs>
        <!-- Silver Gradient -->
        <radialGradient id="silverGrooves" cx="50%" cy="50%" r="50%">
            <stop offset="30%" stop-color="#4a4440" />
            <stop offset="45%" stop-color="#ffa776" />
            <stop offset="60%" stop-color="#a3968e" />
            <stop offset="75%" stop-color="#ffa776" />
            <stop offset="90%" stop-color="#8c7e75" />
            <stop offset="100%" stop-color="#ffa776" />
        </radialGradient>

        <!-- Sheen/Reflection -->
        <linearGradient id="sheen" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="white" stop-opacity="0" />
            <stop offset="40%" stop-color="white" stop-opacity="0" />
            <stop offset="50%" stop-color="white" stop-opacity="0.35" />
            <stop offset="60%" stop-color="white" stop-opacity="0" />
            <stop offset="100%" stop-color="white" stop-opacity="0" />
        </linearGradient>

        <clipPath id="vinylClip">
            <circle cx="100" cy="100" r="99" />
        </clipPath>

        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur" />
            <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <g clip-path="url(#vinylClip)">
        <!-- Main Disc -->
        <circle cx="100" cy="100" r="99" fill="url(#silverGrooves)" stroke="none" />

        <!-- Outer Ring -->
        <circle cx="100" cy="100" r="98" fill="none" stroke="#ffa776" stroke-width="1.5" />

        <!-- Reflections -->
        <rect x="-50" y="-50" width="300" height="300" fill="url(#sheen)" style="mix-blend-mode: overlay;" transform="rotate(25, 100, 100)" />
        <rect x="-50" y="-50" width="300" height="300" fill="url(#sheen)" style="mix-blend-mode: overlay;" transform="rotate(-25, 100, 100)" />

        <!-- Micro-grooves -->
        <g stroke="rgba(255,159,104,0.15)" stroke-width="0.5" fill="none">
            <circle cx="100" cy="100" r="90" />
            <circle cx="100" cy="100" r="78" />
            <circle cx="100" cy="100" r="64" />
            <circle cx="100" cy="100" r="50" />
        </g>
    </g>

    <!-- Sparkles -->
    <g fill="white" filter="url(#glow)">
        <circle cx="145" cy="45" r="1.5" opacity="0.7">
            <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
        </circle>
    </g>

    <!-- Center Label Group -->
    <g>
        <circle cx="100" cy="100" r="32" fill="#58524d" stroke="rgba(0,0,0,0.4)" stroke-width="1.5" />
        
        <!-- Decorative Inner Ring -->
        <circle cx="100" cy="100" r="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-dasharray="3 2" />

        <!-- Score display in the center label -->
        <text x="100" y="106" text-anchor="middle" fill="#ffa776" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 900; font-size: 18px; letter-spacing: -1px;">
            8
        </text>
    </g>

    <!-- Spindle hole -->
    <circle cx="100" cy="100" r="3.5" fill="#130f0d" />
    <circle cx="100" cy="100" r="3.5" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.75" />
</svg>
